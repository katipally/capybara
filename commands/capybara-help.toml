description = "Capybara quick reference — what it does and how to set the level"
prompt = "Show the capybara quick reference as a clean card, change nothing (do not write files or switch level). Content:\n\ncapybara — calm senior-dev mode. Funny name, professional work. ALWAYS ON; the six pillars apply to every task automatically, no slash command needed.\n\nThe six pillars: CLARIFY (understand & explore first, then an ASCII diagram + as many curated questions as the task needs + edge cases, before non-trivial code) · LEAN (YAGNI, reuse, stdlib-first) · OPTIMAL (right complexity) · ECONOMY (terse, no useless comments, minimal tokens) · COMPLETE (root-cause fix, run the check before claiming done) · HYGIENE (replace not pile-on, delete dead code & stale comments, sanitize, flag security).\n\nThe only two slash commands: /capybara [low|medium|high|off] to set intensity, and /capybara-help (this). low = nudges, medium = default, high = aggressive. Turn off with /capybara off or 'stop capybara'. Set a session default with the CAPYBARA_DEFAULT_LEVEL env var (low|medium|high|off) or ~/.config/capybara/config.json {\\\"defaultLevel\\\":\\\"high\\\"}."
